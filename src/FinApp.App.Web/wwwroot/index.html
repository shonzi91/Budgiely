<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>TandemTab — track together, save together</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css?v=3" />
    <link rel="stylesheet" href="FinApp.App.Web.styles.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>

<body>

    <div id="app">
        <div style="display:flex;height:100vh;align-items:center;justify-content:center;font-family:sans-serif;color:#555">Loading…</div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script>
        window.finappViewportWidth = () => window.innerWidth || 0;
        window.finappDownloadFile = (fileName, base64, contentType) => {
            const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
            const blob = new Blob([bytes], { type: contentType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = fileName;
            document.body.appendChild(a); a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>

</body>

</html>
